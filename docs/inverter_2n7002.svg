<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .wire { stroke: #1f2937; stroke-width: 3; fill: none; }
      .thin { stroke: #374151; stroke-width: 2; fill: none; }
      .label { font: 24px monospace; fill: #111827; }
      .small { font: 20px monospace; fill: #111827; }
      .title { font: 34px monospace; fill: #0f172a; font-weight: bold; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; }
      .node { fill: #111827; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <text class="title" x="40" y="52">ELRS S.Port Inverter (2x 2N7002, open-drain compatible)</text>

  <rect class="box" x="40" y="90" width="1120" height="620" rx="14"/>

  <!-- Left connector -->
  <text class="label" x="70" y="180">ESP32_TX_OUT</text>
  <circle class="node" cx="310" cy="172" r="6"/>

  <!-- Stage 1 resistor to gate -->
  <line class="wire" x1="316" y1="172" x2="430" y2="172"/>
  <rect class="box" x="430" y="150" width="120" height="44"/>
  <text class="small" x="462" y="178">R1 10k</text>
  <line class="wire" x1="550" y1="172" x2="610" y2="172"/>

  <!-- Q1 -->
  <rect class="box" x="610" y="130" width="120" height="120"/>
  <text class="label" x="642" y="198">Q1</text>
  <text class="small" x="625" y="228">2N7002</text>
  <line class="wire" x1="670" y1="130" x2="670" y2="88"/>
  <line class="wire" x1="670" y1="250" x2="670" y2="322"/>

  <!-- Pullup stage1 -->
  <line class="wire" x1="760" y1="88" x2="760" y2="42"/>
  <rect class="box" x="730" y="88" width="60" height="120"/>
  <text class="small" x="744" y="155" transform="rotate(-90 744 155)">R2 4.7k</text>
  <line class="wire" x1="730" y1="148" x2="670" y2="148"/>
  <text class="small" x="730" y="30">+3.3V</text>

  <!-- Node INV_A -->
  <line class="wire" x1="670" y1="322" x2="820" y2="322"/>
  <circle class="node" cx="820" cy="322" r="6"/>
  <text class="small" x="836" y="330">INV_A (inverted)</text>

  <!-- Stage 2 resistor -->
  <line class="wire" x1="820" y1="322" x2="900" y2="322"/>
  <rect class="box" x="900" y="300" width="120" height="44"/>
  <text class="small" x="932" y="328">R3 10k</text>
  <line class="wire" x1="1020" y1="322" x2="1080" y2="322"/>

  <!-- Q2 -->
  <rect class="box" x="610" y="390" width="120" height="120"/>
  <text class="label" x="642" y="458">Q2</text>
  <text class="small" x="625" y="488">2N7002</text>
  <line class="wire" x1="1080" y1="322" x2="1080" y2="450"/>
  <line class="wire" x1="1080" y1="450" x2="730" y2="450"/>
  <line class="wire" x1="670" y1="390" x2="670" y2="348"/>
  <line class="wire" x1="670" y1="510" x2="670" y2="580"/>

  <!-- Pullup stage2 -->
  <line class="wire" x1="760" y1="348" x2="760" y2="302"/>
  <rect class="box" x="730" y="348" width="60" height="120"/>
  <text class="small" x="744" y="415" transform="rotate(-90 744 415)">R4 4.7k</text>
  <line class="wire" x1="730" y1="408" x2="670" y2="408"/>
  <text class="small" x="730" y="290">+3.3V</text>

  <!-- Output -->
  <line class="wire" x1="670" y1="580" x2="960" y2="580"/>
  <circle class="node" cx="960" cy="580" r="6"/>
  <text class="label" x="976" y="588">S.PORT_TO_TX_MODULE (non-inverted)</text>

  <!-- GND -->
  <line class="wire" x1="420" y1="650" x2="940" y2="650"/>
  <line class="thin" x1="620" y1="650" x2="620" y2="620"/>
  <line class="thin" x1="645" y1="650" x2="645" y2="620"/>
  <line class="thin" x1="670" y1="650" x2="670" y2="620"/>
  <text class="label" x="520" y="695">GND (common: ESP32 + TX + RX + BEC)</text>

  <line class="wire" x1="670" y1="580" x2="670" y2="620"/>
  <line class="wire" x1="670" y1="322" x2="670" y2="348"/>

  <text class="small" x="70" y="650">Note: This is a logical wiring diagram for branch feature/sport-split-uart.</text>
  <text class="small" x="70" y="680">Add 1k series resistor near TX module input if required by your hardware.</text>
</svg>
